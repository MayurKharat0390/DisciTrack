{% extends "base/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh] animate-fade-in">
    <div class="glass-card w-full max-w-md p-8 bg-slate-900 shadow-2xl">
        <div class="text-center mb-12">
            <div class="w-20 h-20 bg-indigo-500/20 rounded-3xl flex items-center justify-center text-indigo-400 border border-indigo-500/30 mx-auto mb-6">
                <i class="fa-solid fa-rocket text-4xl"></i>
            </div>
            <h1 class="text-4xl font-black text-white tracking-tight">Initialize System</h1>
            <p class="text-slate-500 mt-2 font-medium">Create Your Performance Tracker</p>
        </div>

        <form method="post" class="space-y-8">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn-premium w-full mt-4 flex items-center justify-center space-x-3 py-4 text-lg">
                <i class="fa-solid fa-play"></i>
                <span>Initialize Engine</span>
            </button>
        </form>

        <div class="mt-8 text-center border-t border-slate-800 pt-6">
            <p class="text-slate-400">Already have an engine?</p>
            <a href="{% url 'login' %}" class="text-indigo-400 font-bold hover:text-indigo-300 transition-colors inline-block mt-2">Sign In</a>
        </div>
    </div>
</div>

{% endblock %}
