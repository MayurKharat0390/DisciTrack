{% extends "base/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="animate-fade-in max-w-2xl mx-auto mt-10">
    <div class="glass-card p-10 bg-slate-900 shadow-2xl">
        <div class="flex items-center space-x-6 mb-12">
            <div class="w-16 h-16 bg-emerald-500/20 rounded-2xl flex items-center justify-center text-emerald-400 border border-emerald-500/30">
                <i class="fa-solid fa-camera text-2xl"></i>
            </div>
            <div>
                <h1 class="text-4xl font-black text-white tracking-tight">Proof Submission</h1>
                <p class="text-slate-500 font-medium">Late marking will be flagged automatically.</p>
            </div>
        </div>

        <form method="post" enctype="multipart/form-data" class="space-y-8">
            {% csrf_token %}
            {{ form|crispy }}
            <div class="pt-8">
                <button type="submit" class="btn-premium w-full flex items-center justify-center space-x-3 py-4 text-lg">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <span>Mark as Attended</span>
                </button>
                <div class="text-center mt-6">
                    <a href="{% url 'dashboard' %}" class="text-slate-500 font-bold hover:text-slate-300 transition-colors uppercase tracking-widest text-xs">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>

{% endblock %}
