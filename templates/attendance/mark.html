{% extends "base/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="animate-fade-in max-w-2xl mx-auto mt-10">
    <div class="glass-card p-10 bg-slate-900 shadow-2xl">
        <div class="flex items-center space-x-4 mb-8">
            <div class="p-3 bg-indigo-500/20 rounded-2xl text-indigo-400">
                <i class="fa-solid fa-camera text-3xl"></i>
            </div>
            <div>
                <h1 class="text-3xl font-extrabold text-white tracking-tight">Submit Attendance Proof</h1>
                <p class="text-slate-400">Late marking will be flagged automatically.</p>
            </div>
        </div>

        <form method="post" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            {{ form|crispy }}
            <div class="pt-4">
                <button type="submit" class="btn-premium w-full flex items-center justify-center space-x-2">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <span>Mark as Attended</span>
                </button>
                <a href="{% url 'dashboard' %}" class="block text-center text-slate-500 mt-4 hover:text-slate-300 transition-colors">Cancel</a>
            </div>
        </form>
    </div>
</div>

<style>
    .form-group label { color: #94a3b8; font-weight: 500; font-size: 0.875rem; margin-bottom: 0.5rem; }
    .form-control, .textarea { background-color: #0f172a !important; border-color: #334155 !important; color: white !important; border-radius: 0.75rem !important; }
    .form-control:focus { border-color: #6366f1 !important; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2) !important; }
</style>
{% endblock %}
